services:

  db:
    image: postgres:17
    container_name: rewriting-db
    environment:
      POSTGRES_DB: rewriting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rewriting-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: rewriting
      DB_USER: postgres
      DB_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
